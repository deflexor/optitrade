openapi: 3.0.3
info:
  title: Optitrade Operator Dashboard API
  version: 0.1.0
  description: JSON API served by optitrade dashboard BFF. Session via httpOnly cookie after login.

servers:
  - url: /api/v1
    description: Relative to dashboard origin

tags:
  - name: auth
  - name: dashboard
  - name: positions

paths:
  /auth/register:
    post:
      tags: [auth]
      summary: Register username and password (v1 no email)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Username already exists

  /auth/login:
    post:
      tags: [auth]
      summary: Login; sets session cookie when allowlisted and password valid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Session established
          headers:
            Set-Cookie:
              description: httpOnly session cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginSuccess'
        '401':
          description: Invalid credentials (allowlisted user wrong password)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '403':
          description: Feature not ready (non-allowlisted username)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotReadyError'

  /auth/logout:
    post:
      tags: [auth]
      summary: Clear session cookie
      security:
        - cookieAuth: []
      responses:
        '204':
          description: Logged out

  /snapshot:
    get:
      tags: [dashboard]
      summary: Summary strip (health, mode, equity, regime/mood pair)
      security:
        - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Snapshot'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /pl-series:
    get:
      tags: [dashboard]
      summary: P/L time series (default 30d on server if no range)
      security:
        - cookieAuth: []
      parameters:
        - name: range
          in: query
          schema:
            type: string
            enum: [30d, 7d, 24h]
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PLSeriesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /positions/open:
    get:
      tags: [positions]
      security:
        - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/PositionSummaryOpen'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /positions/closed:
    get:
      tags: [positions]
      security:
        - cookieAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
            maximum: 10
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/PositionSummaryClosed'

  /positions/{positionId}:
    get:
      tags: [positions]
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/PositionId'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PositionDetail'
        '404':
          $ref: '#/components/responses/NotFound'

  /positions/{positionId}/close-preview:
    post:
      tags: [positions]
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/PositionId'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClosePreview'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /positions/{positionId}/close:
    post:
      tags: [positions]
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/PositionId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                confirm:
                  type: boolean
      responses:
        '202':
          description: Close accepted or in progress
        '409':
          description: Conflict or stale book

  /positions/{positionId}/rebalance-preview:
    post:
      tags: [positions]
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/PositionId'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RebalancePreview'

  /positions/{positionId}/rebalance:
    post:
      tags: [positions]
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/PositionId'
      responses:
        '202':
          description: Rebalance accepted or in progress

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: optitrade_session

  parameters:
    PositionId:
      name: positionId
      in: path
      required: true
      schema:
        type: string

  responses:
    Unauthorized:
      description: Not authenticated
    BadRequest:
      description: Validation error
    NotFound:
      description: Unknown position

  schemas:
    RegisterRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          format: password

    RegisterResponse:
      type: object
      properties:
        username:
          type: string

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          format: password

    LoginSuccess:
      type: object
      properties:
        username:
          type: string

    ErrorBody:
      type: object
      properties:
        error:
          type: string

    NotReadyError:
      type: object
      properties:
        error:
          type: string
          example: Sorry, feature not ready

    Snapshot:
      type: object
      required:
        - snapshot_utc
        - process_uptime_sec
        - process_rss_bytes
        - deribit_connected
        - deribit_environment
        - equity_usd
        - classification
        - regime_label
        - market_mood_label
        - stale
      properties:
        snapshot_utc:
          type: string
          format: date-time
        process_uptime_sec:
          type: integer
          format: int64
        process_rss_bytes:
          type: integer
          format: int64
        deribit_connected:
          type: boolean
        deribit_environment:
          type: string
          enum: [test, live]
        equity_usd:
          type: string
        classification:
          type: string
          description: Canonical regime label from bot
        regime_label:
          type: string
          description: Must equal classification
        market_mood_label:
          type: string
          description: Must equal classification
        stale:
          type: boolean

    PLSeriesResponse:
      type: object
      properties:
        range:
          type: string
        points:
          type: array
          items:
            type: object
            required: [t, pnl_usd]
            properties:
              t:
                type: string
                format: date-time
              pnl_usd:
                type: string

    PositionSummaryOpen:
      type: object
      properties:
        position_id:
          type: string
        strategy_name:
          type: string
        expected_pnl_usd_at_open:
          type: string
        win_rate_pct:
          type: number

    PositionSummaryClosed:
      allOf:
        - $ref: '#/components/schemas/PositionSummaryOpen'
        - type: object
          properties:
            realized_pnl_usd:
              type: string
            realized_pnl_pct:
              type: number
            closed_at:
              type: string
              format: date-time

    PositionDetail:
      type: object
      properties:
        summary:
          $ref: '#/components/schemas/PositionSummaryOpen'
        legs:
          type: array
          items:
            $ref: '#/components/schemas/PositionLeg'
        metrics:
          type: object
          additionalProperties: true

    PositionLeg:
      type: object
      properties:
        instrument_name:
          type: string
        side:
          type: string
        size:
          type: string
        liquidity_notes:
          type: string
        delta:
          type: string
        gamma:
          type: string
        vega:
          type: string
        theta:
          type: string

    ClosePreview:
      type: object
      properties:
        estimated_pnl_usd:
          type: string
        quote_as_of:
          type: string
          format: date-time
        recommendation:
          type: string
          enum: [close_now, wait, neutral]
        rationale:
          type: string

    RebalancePreview:
      type: object
      properties:
        suggestions:
          type: array
          items:
            type: object
            properties:
              rank:
                type: integer
              title:
                type: string
              detail:
                type: string
              expected_effect:
                type: string
